# --- 7. WINDOW RULES 0.53 ---

#windowrule = tile on, match:workspace special:magic

# App Launcher & Clipboard
# Music Widget
windowrule {
    name = music-player
    match:class = music
    float = on
    size = 650 450
    move = 0 60
    center = on
}

# System & Terminal Tools
windowrule {
    name = kitty
    match:class = kitty
    float = on
    size = 1000 780
    move = 0 60
    center = on
    workspace = 2
    opacity = 0.6 0.6
    border_size = 0
    xray = on
}

# File Managers
windowrule {
    name = file-managers
    match:class = thunar
    size = 1000 780
    float = on
    center = on
    animation = fade
    opacity = 0.8 0.8
}

# Editors & Tools
windowrule {
    name = geany-rule
    match:class = geany
    float = on
    size = 900 780
    center = on
    animation = fade
}
windowrule {
    name = qalculate-rule
    match:class = qalculate-gtk
    float = on
    center = on
    animation = slide
    opacity = 0.7 0.7
}
windowrule {
	name = browsers
	match:class = ^(falcon|floorp)$
	workspace = 1
	size = 950 750
}
windowrule {
	name = rtm
	match:class = rtm
	float = on
	size = 740 780
	center = on
	workspace = 3
	no_blur = on
	move = 0 60
	border_size = 0
}
windowrule {
    name = budget-buddy
    match:class = budget-buddy
    float = on
    size = 740 780
    center = on
    move = 0 60
    workspace = 3
    border_size = 0
}

# --- 8. NEW 0.53 LAYER RULES ---

# Rofi / Drun Layer
layerrule {
    name = rofi_layer_rule
    match:namespace = ^(rofi|drun|dmenu)$
    animation = slide
    blur = on
    ignore_alpha = 0.2
}

# Waybar Layer
layerrule {
    name = waybar-layer
    match:namespace = waybar
    blur = on
    no_anim = on
    ignore_alpha = 0.5
}

# Desktop Widgets
layerrule {
    name = system-pod-layer
    match:namespace = ^(org.waybar.pod)$
    blur = on # Usually better for small text widgets
    no_anim = on
}
