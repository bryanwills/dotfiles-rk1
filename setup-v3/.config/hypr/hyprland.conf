########################################################################################
# HYPRLAND DYNAMIC CONFIG (DWINDLE LAYOUT)
########################################################################################

# --- 1. SOURCES & ENV ---
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = TERMINAL,kitty

# --- 2. MONITOR & INPUT ---
monitor=,preferred,auto,1.25

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 
touchpad {
    natural_scroll = no
    tap-to-click = true
    tap-and-drag = true
    }
}

misc {
    vfr = true  # Enables Variable Frame Rate to save CPU cycles
    disable_hyprland_logo = true
}

# --- 3. VARIABLES ---
$mainMod = SUPER
$altMod = ALT
$terminal = kitty
$backup_terminal = foot
$menu = rofi -show drun --term kitty -show-icons
$filemanager = thunar

# Source external config files
source = ~/.config/hypr/configs/autostart.conf
source = ~/.config/hypr/configs/keybinds.conf
source = ~/.config/hypr/configs/windowrules.conf


# --- 5. LOOK & FEEL ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(0abdc6)
    col.inactive_border = rgba(cb0fe8e6)
    layout = master
    }

master {
	new_status = slave
	new_on_active = none
	new_on_top = false
	mfact = 0.55
	orientation = left
	special_scale_factor = 1.0
	slave_count_for_center_master = 2
}

decoration {
    rounding = 5    
    active_opacity = 0.90
    inactive_opacity = 0.75
    fullscreen_opacity = 1

blur {
    enabled = true
    size = 8
    new_optimizations = true
    }
   
shadow {
    enabled = true
    range = 25
    render_power = 4
    color = rgba(27ffff6b) # Neon glow
    }

animations {
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = workspaces, 1, 3, default
}
}
