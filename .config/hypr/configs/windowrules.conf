# --- WINDOW RULES 0.54+ ---
# Widgets Rules
windowrule {
	name = keybinds-widget
	match:class = keybinds
	float = on
	size = 750 650
	move = 585 9
	animation = slide top
}

windowrule {
	name = aliases-widget
	match:class = show-aliases
	float = on
	size = 750 650
	move = 585 9
	animation = slide top
}

windowrule {
	name = clipbox-widget
	match:title = clipbox-widget
	float = on
	size = 750 650
	move = 585 9
	animation = slide top
}

windowrule {
	name = control-panel-widget
	match:title = control-panel.py
	float = on
	size = 750 650
	move = 585 50
	animation = slide top
}

windowrule {
	name = audio-widget
	match:title = Audio Switcher
	float = on
	move = 710 0
	size = 500 250
	animation = slide top
}

windowrule {
	name = mirec-widget
	match:title = Mirec
	float = on
	move = 10 55
	animation = slide top
	size = 500 250
}

windowrule {
	name = bt-widget
	match:class = bt-menu
	float = on
	move = 660 0
	animation = slide top
	size = 600 400
}

windowrule {
	name = wifi-widget
	match:class = floating_wifi
    float = on
	move = 560 0
	animation = slide top
	size = 700 400
}

windowrule {
	name = waybar-widget
	match:class = changewaybar-widget.py
}
windowrule {
	name = notif-widget
	match:class = notif-widget.py
	float = on
	move = 800 5
	size = 400 600
	animation = slide top
}
# App Launcher & Clipboard
windowrule {
	name = notifications
	match:class = dunst
	opacity = 0.8 0.8
}
# Music Widget
windowrule {
    name = music-player
    match:class = music
    size = 1000 450
    move = 0 60
    center = on
}

# System & Terminal Tools
windowrule {
    name = kitty
    match:class = kitty
    border_size = 0px
    border_color = @color0
}

# File Managers
windowrule {
    name = file-managers
    match:class = thunar|yazi
    animation = fade
    opacity = 1
}

# Editors & Tools
windowrule {
    name = geany-rule
    match:class = geany
    animation = fade
    workspace = 3
}
windowrule {
    name = qalculate-rule
    match:class = qalculate-gtk
    animation = slide top
    opacity = 1
    size = 600 400
}
windowrule {
	name = browsers
	match:class = falcon
	workspace = 1
}
windowrule {
    name = min-browser
    match:class = Min
    workspace = 1
    opacity = 1
}
windowrule {
    name = save-open-rule
    match:title = ^.*(Save|Open).*$
    stay_focused = on
    float = on
    center = on
}
windowrule {
	name = rtm
	match:class = rtm
	float = on
	size = 800 880
	move = 550 10
	animation = slide top
}
windowrule {
    name = budget-buddy
    match:class = budget-buddy
    float = on
    size = 740 780
    move = 550 10
    animation = slide top
}

# --- 8. NEW 0.54 LAYER RULES ---

layerrule {
	name = notifications
	match:namespace = dunst
	blur = on
}
# Waybar Layer
layerrule {
    name = waybar-layer
    match:namespace = waybar
    blur = on
    no_anim = on
    ignore_alpha = 0.5
}

# Desktop Widgets
# Workspaces
#workspace = s[true], gapsout:0, gapsin:0
#workspace = w[tv1], gapsout:0, gapsin:0
