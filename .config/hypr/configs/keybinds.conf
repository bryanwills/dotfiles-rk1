# Main Keybids
bindd = $mainMod, Return, Open Kitty, exec, kitty
bindd = $mainMod SHIFT, Return, Opens Backup Terminal, exec, $backup_terminal
bindd = $mainMod, X, Closes Active Window, killactive
bindd = $mainMod, Space, Toggle Floating Mode, togglefloating 
bindd = $mainMod, F, Active Window Fullscreen, fullscreen, 1
bindd = $mainMod SHIFT, Q, Logout, exit
bindd = $mainMod, S, Toggle D/L Mode, exec, ~/.local/bin/toggle-theme
bindd = $altMod, N, Night Light, exec, ~/.local/bin/nightlight
bindd = $mainMod, C, Opens Power Menu, exec, python3 /home/rk1/custom-scripts/cpanel-widget.py
bindd = $mainMod, B, Opens Bluetooth widget, exec, kitty --class bt-menu -e $HOME/custom-scripts/bluetooth//bt
bindd = $altMod, 0, Wifi FZF widget, exec, kitty --class floating_wifi -e ~/custom-scripts/wifi/wwifi

# App Launchers
bindd = $mainMod, A, App Launcher, exec, bindd = $mainMod, D, App Launcher, exec, pkill -f launcher-widget.py || python3 /home/rk1/custom-scripts/launcher-widget.py 2>/dev/null
bindd = $mainMod, Y, Yazi in Kitty, exec, kitty --class yazi -e yazi
bindd = $mainMod, W, Wallpaper Switcher, exec, python3 /home/rk1/custom-scripts/changewall-widget.py
bindd = $altMod, W, Waybar Themes, exec, python3 ~/custom-scripts/changewaybar-widget.py
bindd = $mainMod SHIFT, Y, Btop, exec, kitty -a btop_float btop
bindd = $mainMod, T, Thunar, exec,  thunar
bindd = $altMod, M, Music Player, exec, kitty --class music --app-id=music kew
bindd = $altMod, 1, RTM Task Manager, exec, kitty --class rtm -e python3 ~/arch-projects/RTM/rtm.py
bindd = $altMod, 2, Budget Manager, exec, kitty --class budget-buddy -e python3 ~/arch-projects/Budget-Buddy/budget-buddy.py

# Widgets
bindd = $altMod, B, Opens Battery info, exec, python3 /home/rk1/custom-scripts/battery-widget.py
bindd = $altMod, S, System Stats Mode, exec, python3 /home/rk1/custom-scripts/sysmon-widget.py
# Open Notification History with Alt + A
bindd = $altMod, A, Notification Center, exec, python3 /home/rk1/custom-scripts/notif-widget.py
bindd = $altMod, R, Open Screen Recorder, exec, kitty --title="Mirec" -e ~/arch-projects/MIREC/mirec

# Easy access to your history menu
bindd = SUPER, V, Opens Clipboard, exec, python3 /home/rk1/custom-scripts/clipbox-widget.py

# --- Navigation (Master Layout Optimized) ---
# Basic Focus
bindd = $mainMod, H, Focus Left (Master), movefocus, l
bindd = $mainMod, L, Focus Right (Stack), movefocus, r
bindd = $mainMod, K, Focus Up, movefocus, u
bindd = $mainMod, J, Focus Down, movefocus, d

# Master Layout Controls (Improved)
bindd = $altMod, Space, Promote to Master, layoutmsg, swapwithmaster master
bindd = $altMod, J, Cycle Next Window, layoutmsg, cyclenext
bindd = $altMod, K, Cycle Previous Window, layoutmsg, cycleprev
bindd = $altMod, L, Increase Master Size, layoutmsg, mfact +0.05
bindd = $altMod, H, Decrease Master Size, layoutmsg, mfact -0.05

# Master Add/Remove (If you want more than one 'big' window)
bindd = $mainMod, Equal, Add Master, layoutmsg, addmaster
bindd = $mainMod, Minus, Remove Master, layoutmsg, removemaster

# Workspaces
bindd = $mainMod, 1, Go to Workspace 1, workspace, 1
bindd = $mainMod, 2, Go to Workspace 2, workspace, 2
bindd = $mainMod, 3, Go to Workspace 3, workspace, 3
bindd = $mainMod, 4, Go to Workspace 4, workspace, 4
bindd = $mainMod, 5, Go to Workspace 5, workspace, 5
bindd = $mainMod SHIFT, 1, Move Window to Workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move Window to Workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move Window to Workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move Window to Workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move Window to Workspace 5, movetoworkspace, 5

# Screenshot
# bindd = $mainMod, Print, Select Area Screenshot, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send
# bindd = $mainMod, Print, Select Area Screenshot, exec, slurp | xargs -I {} sh -c "sleep 0.3 && grim -g '{}' ~/Pictures/Screenshots/\$(date +%Y%m%d_%H%M%S).png" && notify-send "Screenshot Captured"
bindd = $mainMod, Print, Select Area Screenshot, exec, slurp -b 00000000 -c ffff00 -w 1 | xargs -I {} sh -c "sleep 0.2 && grim -g '{}' ~/Pictures/Screenshots/\$(date +%Y%m%d_%H%M%S).png" && notify-send "Screenshot Captured"
bindd = , Print, Full Screen Screenshot, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Hardware Keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:vol -h "int:value:$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')" "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')%"
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:vol -h "int:value:$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')" "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')%"
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && notify-send -h string:x-canonical-private-synchronous:bright -h "int:value:$(brightnessctl i | grep -oP '\(\K[^%]+')" "Brightness: $(brightnessctl i | grep -oP '\(\K[^%]+')%"
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send -h string:x-canonical-private-synchronous:bright -h "int:value:$(brightnessctl i | grep -oP '\(\K[^%]+')" "Brightness: $(brightnessctl i | grep -oP '\(\K[^%]+')%"

# --- RESIZE MODE ---
# Using R for "Resize"
bindd = $mainMod, R, Enter Resize Mode, submap, resize 

submap = resize

# 'e' flag allows the command to repeat when the key is held
bindde = , right, Resize Right, resizeactive, 10 0
bindde = , left, Resize Left,resizeactive, -10 0
bindde = , up, Resize Up, resizeactive, 0 -10
bindde = , down, Resize Down, resizeactive, 0 10

# Use 'Escape' or 'Enter' to go back to normal mode
bindd = , escape, Exit Resize Mode, submap, reset 
bindd = , return, Exit Resize Mode, submap, reset 

submap = reset

# Move windows with mainMod + LMB and dragging
bindm = $mainMod, mouse:272, movewindow

# Resize windows with mainMod + RMB and dragging
bindm = $mainMod, mouse:273, resizewindow

